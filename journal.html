<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>アウトプット部屋｜Takumi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:#0f0f0f; --bg:#fafaf8; --text:#1a1a1a;
  --text-mid:#555; --text-light:#999;
  --border:rgba(0,0,0,.08);
  --accent:#2563eb; --accent-light:#eff6ff;
  --tag-bg:#eef2ff; --tag-color:#3730a3;
  --danger:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ── Gate ── */
#gate{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.gate-box{width:100%;max-width:360px;padding:0 24px;text-align:center;}
.gate-box h1{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:800;margin-bottom:8px;}
.gate-box p{font-size:.85rem;color:var(--text-light);margin-bottom:28px;}
.gate-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:12px;font-family:'Zen Kaku Gothic New',sans-serif;}
.gate-input:focus{border-color:var(--accent);}
.gate-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}
.gate-btn:hover{opacity:.8;}
.gate-error{font-size:.8rem;color:var(--danger);margin-top:8px;min-height:1.2em;}

/* ── Main ── */
#main{display:none;min-height:100vh;}

header{border-bottom:1px solid var(--border);padding:20px 0;}
.header-inner{max-width:720px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.site-title{font-family:'Shippori Mincho',serif;font-size:1.15rem;font-weight:800;}
.site-sub{font-size:.75rem;color:var(--text-light);}

/* ── Write button ── */
.write-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);color:#fff;
  border:none;border-radius:8px;
  padding:9px 18px;font-size:.85rem;font-weight:700;
  cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;
  transition:opacity .2s;
}
.write-btn:hover{opacity:.85;}

/* ── Write form ── */
.write-panel{
  max-width:720px;margin:0 auto;padding:0 24px;
  display:none;
}
.write-panel.open{display:block;}
.write-form{
  background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:28px;margin:24px 0 0;
}
.write-form h2{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:800;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:.78rem;font-weight:700;color:var(--text-light);margin-bottom:6px;letter-spacing:.04em;}
.form-input, .form-textarea{
  width:100%;padding:10px 14px;
  border:1px solid var(--border);border-radius:8px;
  font-size:.92rem;font-family:'Zen Kaku Gothic New',sans-serif;
  outline:none;transition:border-color .2s;background:#fff;
  color:var(--text);
}
.form-input:focus, .form-textarea:focus{border-color:var(--accent);}
.form-textarea{min-height:200px;resize:vertical;line-height:1.8;}
.form-hint{font-size:.72rem;color:var(--text-light);margin-top:4px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.btn-save{
  padding:10px 24px;background:var(--ink);color:#fff;
  border:none;border-radius:8px;font-size:.9rem;font-weight:700;
  cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;
}
.btn-save:hover{opacity:.8;}
.btn-cancel{
  padding:10px 20px;background:transparent;color:var(--text-light);
  border:1px solid var(--border);border-radius:8px;font-size:.9rem;
  cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;
}
.btn-cancel:hover{border-color:#aaa;}

/* ── Feed ── */
.feed{max-width:720px;margin:0 auto;padding:32px 24px 120px;}
.empty-state{text-align:center;padding:80px 0;color:var(--text-light);font-size:.9rem;}

.month-divider{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);padding:32px 0 0;}

.entry{padding:40px 0;border-bottom:1px solid var(--border);position:relative;}
.entry:last-child{border-bottom:none;}
.entry-date{font-size:.78rem;color:var(--text-light);font-weight:500;letter-spacing:.04em;margin-bottom:10px;}
.entry-title{font-family:'Shippori Mincho',serif;font-size:1.5rem;font-weight:800;line-height:1.4;margin-bottom:12px;}
.entry-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.tag{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px;background:var(--tag-bg);color:var(--tag-color);}
.entry-body{font-size:.95rem;line-height:1.95;color:var(--text-mid);white-space:pre-wrap;}

.entry-del{
  position:absolute;top:40px;right:0;
  background:none;border:none;cursor:pointer;
  color:var(--text-light);font-size:.8rem;
  padding:4px 8px;border-radius:4px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  transition:color .2s;
}
.entry-del:hover{color:var(--danger);}

@media(max-width:600px){
  .entry-title{font-size:1.2rem;}
  .feed,.write-panel{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<!-- パスワードゲート -->
<div id="gate">
  <div class="gate-box">
    <h1>アウトプット部屋</h1>
    <p>Takumiの学習ログ</p>
    <input class="gate-input" type="password" id="pwInput" placeholder="パスワード" autocomplete="off"/>
    <button class="gate-btn" id="pwBtn">入る</button>
    <div class="gate-error" id="pwError"></div>
  </div>
</div>

<!-- メイン -->
<div id="main">

  <header>
    <div class="header-inner">
      <span class="site-title">アウトプット部屋</span>
      <button class="write-btn" id="toggleWrite">＋ 書く</button>
    </div>
  </header>

  <!-- 書き込みフォーム -->
  <div class="write-panel" id="writePanel">
    <div class="write-form">
      <h2>新しいエントリー</h2>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="text" id="fDate" placeholder="2026.03.18 Wed"/>
      </div>
      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input class="form-input" type="text" id="fTitle" placeholder="今日学んだこと、気づき"/>
      </div>
      <div class="form-group">
        <label class="form-label">タグ</label>
        <input class="form-input" type="text" id="fTags" placeholder="AI, Claude, 事業"/>
        <div class="form-hint">カンマ区切りで複数入力可</div>
      </div>
      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-textarea" id="fBody" placeholder="今日のインプットとアウトプットをここに書く。&#10;&#10;何を読んだか、何を考えたか、何を試したか。&#10;改行そのまま反映される。"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="saveBtn">保存する</button>
        <button class="btn-cancel" id="cancelBtn">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- フィード -->
  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">まだエントリーがありません。「書く」から始めよう。</div>
  </div>

</div><!-- /main -->

<script>
const PASS = '19950214Aaa';
const STORAGE_KEY = 'jl_entries';

// ── Auth ──
const gate  = document.getElementById('gate');
const main  = document.getElementById('main');
const pwInput = document.getElementById('pwInput');
const pwBtn   = document.getElementById('pwBtn');
const pwError = document.getElementById('pwError');

function unlock() {
  if (pwInput.value === PASS) {
    gate.style.display = 'none';
    main.style.display = 'block';
    sessionStorage.setItem('jl_auth', '1');
    renderFeed();
  } else {
    pwError.textContent = 'パスワードが違います';
    pwInput.value = '';
    pwInput.focus();
  }
}
if (sessionStorage.getItem('jl_auth') === '1') {
  gate.style.display = 'none';
  main.style.display = 'block';
  renderFeed();
}
pwBtn.addEventListener('click', unlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// ── Storage ──
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ── Form ──
const toggleBtn  = document.getElementById('toggleWrite');
const writePanel = document.getElementById('writePanel');
const cancelBtn  = document.getElementById('cancelBtn');
const saveBtn    = document.getElementById('saveBtn');
const fDate  = document.getElementById('fDate');
const fTitle = document.getElementById('fTitle');
const fTags  = document.getElementById('fTags');
const fBody  = document.getElementById('fBody');

// 今日の日付を自動セット
function todayStr() {
  const d = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day} ${days[d.getDay()]}`;
}

toggleBtn.addEventListener('click', () => {
  const open = writePanel.classList.toggle('open');
  toggleBtn.textContent = open ? '✕ 閉じる' : '＋ 書く';
  if (open) { fDate.value = todayStr(); fTitle.focus(); }
});

cancelBtn.addEventListener('click', () => {
  writePanel.classList.remove('open');
  toggleBtn.textContent = '＋ 書く';
  clearForm();
});

saveBtn.addEventListener('click', () => {
  const title = fTitle.value.trim();
  const body  = fBody.value.trim();
  if (!title) { fTitle.focus(); return; }
  if (!body)  { fBody.focus(); return; }

  const entries = loadEntries();
  entries.unshift({
    id: Date.now(),
    date: fDate.value.trim() || todayStr(),
    title,
    tags: fTags.value.split(',').map(t => t.trim()).filter(Boolean),
    body,
  });
  saveEntries(entries);
  clearForm();
  writePanel.classList.remove('open');
  toggleBtn.textContent = '＋ 書く';
  renderFeed();
});

function clearForm() {
  fDate.value = ''; fTitle.value = ''; fTags.value = ''; fBody.value = '';
}

// ── Render ──
const feed       = document.getElementById('feed');
const emptyState = document.getElementById('emptyState');

function renderFeed() {
  const entries = loadEntries();
  // 既存エントリー（.entry）を削除、month-dividerも削除
  feed.querySelectorAll('.entry, .month-divider').forEach(el => el.remove());

  if (entries.length === 0) {
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  let lastMonth = '';
  entries.forEach(e => {
    // 月見出し
    const month = e.date.slice(0, 7).replace('.', ' / ');
    if (month !== lastMonth) {
      const div = document.createElement('div');
      div.className = 'month-divider';
      div.textContent = month;
      feed.appendChild(div);
      lastMonth = month;
    }

    const article = document.createElement('article');
    article.className = 'entry';
    article.dataset.id = e.id;

    const tagsHtml = (e.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');

    article.innerHTML = `
      <button class="entry-del" data-id="${e.id}">削除</button>
      <div class="entry-date">${esc(e.date)}</div>
      <h2 class="entry-title">${esc(e.title)}</h2>
      ${tagsHtml ? `<div class="entry-tags">${tagsHtml}</div>` : ''}
      <div class="entry-body">${esc(e.body)}</div>
    `;
    feed.appendChild(article);
  });

  // 削除ボタン
  feed.querySelectorAll('.entry-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('このエントリーを削除しますか？')) return;
      const id = Number(btn.dataset.id);
      saveEntries(loadEntries().filter(e => e.id !== id));
      renderFeed();
    });
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>

</body>
</html>
